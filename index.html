<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#080808">
<title>Hyundai Ioniq 5 · 2026</title>
<script defer src="/_vercel/insights/script.js"></script>
<style>
  :root {
    --bg: #080808;
    --surface: #111111;
    --border: rgba(255,255,255,0.08);
    --text: #f0f0f0;
    --text-muted: #888;
    --accent: #c8a96e;
    --accent-dim: rgba(200,169,110,0.12);
    --radius: 12px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { height: 100%; overflow: hidden; }
  body {
    height: 100%; overflow: hidden;
    background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    display: flex; flex-direction: column;
  }

  /* ── HEADER ── */
  header { flex-shrink: 0; padding: 12px 20px 8px; display: flex; flex-direction: column; gap: 8px; }
  .brand-row { display: flex; align-items: baseline; gap: 8px; }
  .brand-title { font-size: 12px; font-weight: 700; letter-spacing: 0.16em; text-transform: uppercase; color: var(--text); }
  .brand-year  { font-size: 12px; font-weight: 400; letter-spacing: 0.06em; color: var(--text-muted); }

  /* ── SELECTOR AREA (colour slates or model slates) ── */
  #selectorArea { display: flex; gap: 8px; }

  /* Model slates */
  .model-slate {
    flex: 1; padding: 9px 12px; min-height: 44px;
    border-radius: var(--radius); border: 1.5px solid rgba(255,255,255,0.07);
    cursor: pointer; position: relative; overflow: hidden;
    display: flex; align-items: center; justify-content: center;
    transition: border-color 0.25s, transform 0.15s; user-select: none;
  }
  .model-slate:hover { transform: translateY(-1px); }
  .model-slate.active { border-color: rgba(200,169,110,0.55); box-shadow: 0 0 0 1px rgba(200,169,110,0.15); }
  .model-slate-ultimate { background: linear-gradient(145deg, #1e2535 0%, #151a28 100%); }
  .model-slate-nline    { background: linear-gradient(145deg, #202028 0%, #15151e 100%); }
  .model-slate-n        { background: linear-gradient(145deg, #281c1c 0%, #1a1212 100%); }
  .model-slate-name { font-size: 13px; font-weight: 700; color: rgba(255,255,255,0.82); letter-spacing: 0.04em; }

  /* ── COLOUR SLATES ── */
  .colour-card {
    flex: 1; padding: 9px 12px;
    border-radius: var(--radius); border: 2px solid transparent;
    cursor: pointer; transition: border-color 0.25s, transform 0.15s, box-shadow 0.25s;
    user-select: none; position: relative; overflow: hidden;
  }
  .colour-card:hover { transform: translateY(-1px); }
  .colour-card.active {
    border-color: rgba(255,255,255,0.6);
    box-shadow: 0 0 0 1px rgba(255,255,255,0.15), 0 4px 20px rgba(0,0,0,0.5);
  }
  .colour-card.black-card     { background: linear-gradient(145deg, #2e2e33 0%, #1a1a1f 40%, #0e0e12 100%); }
  .colour-card.ecotronic-card { background: linear-gradient(145deg, #7a7f78 0%, #5e6359 40%, #444840 100%); }
  .colour-card.cyber-card     { background: linear-gradient(145deg, #d0d4d8 0%, #b0b6bc 40%, #8e9399 100%); }
  .colour-card.red-card       { background: linear-gradient(145deg, #cc3b2a 0%, #a82d1e 40%, #7a1f13 100%); }
  .colour-card-name {
    font-size: 12px; font-weight: 700; color: #fff; line-height: 1.2;
    text-shadow: -0.5px -0.5px 0 #000, 0.5px -0.5px 0 #000, -0.5px 0.5px 0 #000, 0.5px 0.5px 0 #000, 0 2px 6px rgba(0,0,0,0.35);
  }
  .colour-card-name2 {
    font-size: 10px; font-weight: 600; color: rgba(255,255,255,0.8); line-height: 1.2; margin-top: 2px;
    text-shadow: 0 1px 3px rgba(0,0,0,0.6);
  }
  .active-tick {
    position: absolute; top: 8px; right: 8px; width: 15px; height: 15px;
    background: rgba(255,255,255,0.2); border: 1.5px solid rgba(255,255,255,0.5);
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    opacity: 0; transition: opacity 0.2s;
  }
  .colour-card.active .active-tick { opacity: 1; }
  .active-tick svg { width: 7px; height: 7px; color: #fff; }

  /* ── COMPARE BAR ── */
  .compare-bar { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .compare-label { font-size: 12px; font-weight: 700; color: var(--text); letter-spacing: 0.16em; text-transform: uppercase; }
  .compare-toggle {
    display: flex; gap: 2px;
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12);
    border-radius: 22px; padding: 2px;
  }
  .compare-tab {
    font-size: 12px; font-weight: 600; color: var(--text-muted);
    padding: 5px 16px; border-radius: 20px; cursor: pointer;
    border: 1px solid transparent;
    transition: color 0.2s, background 0.2s, border-color 0.2s; user-select: none;
  }
  .compare-tab.active { color: var(--accent); background: var(--accent-dim); border-color: rgba(200,169,110,0.3); }
  .compare-tab:not(.active):hover { color: var(--text); }
  .model-picker { display: none; align-items: center; gap: 4px; margin-left: 8px; }
  .model-picker.visible { display: flex; }
  .model-pill {
    font-size: 11px; font-weight: 600; color: var(--text-muted);
    padding: 3px 10px; border-radius: 20px; cursor: pointer;
    border: 1px solid var(--border);
    transition: color 0.2s, background 0.2s, border-color 0.2s; user-select: none;
  }
  .model-pill.active { color: var(--text); background: var(--surface); border-color: rgba(255,255,255,0.25); }
  .model-pill:not(.active):hover { color: var(--text); }

  /* ── COMPARISON AREA ── */
  .comparison { flex: 1; display: flex; gap: 8px; padding: 0 20px 14px; min-height: 0; overflow: hidden; }

  .model-panel {
    flex: 1; position: relative;
    background: var(--surface); border-radius: var(--radius);
    overflow: hidden; min-height: 0; border: 1px solid var(--border);
  }

  .image-wrap { position: absolute; inset: 0; background: #0c0c0c; }

  .car-img {
    position: absolute; inset: 0; width: 100%; height: 100%;
    object-fit: contain; padding: 8px;
    will-change: opacity, transform; cursor: zoom-in;
    transition: filter 0.3s ease;
  }
  .car-img.dimmed { filter: brightness(0.25) blur(1px); }

  /* Panel label — positioned by JS positionOverlays(), sits at bottom of image content */
  .panel-label {
    position: absolute; bottom: 14px; left: 50%; transform: translateX(-50%); top: auto;
    z-index: 4; background: none; backdrop-filter: none;
    border: none; border-radius: 0;
    padding: 2px 4px; font-size: 12px; font-weight: 700; color: #111;
    white-space: nowrap; letter-spacing: 0.02em;
  }
  /* Interior images have dark backgrounds — keep label white */
  .panel-label.label-interior { color: #fff; }

  /* Hyundai logo — hidden everywhere */
  .panel-logo {
    display: none !important;
    position: absolute; top: 14px; right: 14px; left: auto; z-index: 4;
    height: 22px; width: auto; opacity: 0.3;
    filter: brightness(0) invert(1); pointer-events: none;
  }

  /* Inline 5N name on colour card */
  .colour-card-name2-inline {
    font-size: 9px; font-weight: 500; opacity: 0.75; margin-left: 5px;
  }

  /* Compact colour cards in 2×2 grid */
  .colour-card-grid { padding: 5px 10px; min-height: 0; }
  .colour-card-grid .colour-card-name { font-size: 11px; }

  /* Colour swatches — shown in Trim/Model mode below model slates */
  .colour-swatches-row { display: flex; gap: 6px; margin-top: 6px; }
  .colour-swatch {
    flex: 1; padding: 5px 8px; border-radius: var(--radius);
    border: 1.5px solid transparent; cursor: pointer; user-select: none;
    opacity: 0.4; transition: border-color 0.2s, opacity 0.2s;
    display: flex; align-items: center; gap: 5px;
  }
  .colour-swatch.swatch-active { border-color: rgba(255,255,255,0.5); opacity: 1; }
  .swatch-name { font-size: 10px; font-weight: 700; color: #fff; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    text-shadow: 0 1px 2px rgba(0,0,0,0.6); }
  .swatch-tick { flex-shrink: 0; width: 12px; height: 12px; }
  .colour-swatch.black-card     { background: linear-gradient(145deg, #2e2e33 0%, #1a1a1f 40%, #0e0e12 100%); }
  .colour-swatch.ecotronic-card { background: linear-gradient(145deg, #7a7f78 0%, #5e6359 40%, #444840 100%); }
  .colour-swatch.cyber-card     { background: linear-gradient(145deg, #d0d4d8 0%, #b0b6bc 40%, #8e9399 100%); }
  .colour-swatch.red-card       { background: linear-gradient(145deg, #cc3b2a 0%, #a82d1e 40%, #7a1f13 100%); }

  .missing-placeholder {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 8px; opacity: 0.2;
  }
  .missing-placeholder svg { width: 32px; height: 32px; }
  .missing-placeholder p { font-size: 10px; color: var(--text-muted); }

  /* ── SPECS OVERLAY ── */
  .specs-overlay {
    display: none;
    position: absolute; inset: 0; z-index: 3;
    flex-direction: column; justify-content: center;
    padding: 20px 18px 20px 15%;
    background: linear-gradient(110deg, rgba(0,0,0,0.35) 0%, rgba(0,0,0,0.22) 70%, rgba(0,0,0,0.06) 100%);
  }
  .specs-overlay.visible { display: flex; }

  .specs-heading {
    font-size: 19px; font-weight: 700; color: var(--text);
    letter-spacing: 0.02em; margin-bottom: 12px; line-height: 1.1;
  }
  .specs-list { list-style: none; display: flex; flex-direction: column; gap: 4px; }
  .specs-list li {
    font-size: 13px; color: rgba(255,255,255,0.92); line-height: 1.3;
    display: flex; align-items: flex-start; gap: 9px;
  }
  .specs-list li::before {
    content: '●'; color: var(--accent); flex-shrink: 0;
    font-size: 7px; margin-top: 4px;
  }

  /* ── PANEL ARROWS ── */
  .panel-arrow {
    position: absolute; top: 50%; transform: translateY(-50%);
    z-index: 5; width: 36px; height: 36px; border-radius: 50%;
    border: 1.5px solid rgba(255,255,255,0.14);
    background: rgba(8,8,8,0.72); backdrop-filter: blur(6px); color: var(--text);
    display: flex; align-items: center; justify-content: center; cursor: pointer;
    transition: border-color 0.2s, background 0.2s, opacity 0.2s, transform 0.15s;
  }
  .panel-arrow:hover { border-color: var(--accent); background: var(--accent-dim); transform: translateY(-50%) scale(1.08); }
  .panel-arrow svg { width: 18px; height: 18px; }
  .panel-arrow-left  { left: 8px; }
  .panel-arrow-right { right: 8px; }

  /* ── LIGHTBOX ── */
  #lightbox {
    display: none; position: fixed; inset: 0; z-index: 100;
    background: rgba(0,0,0,0.96); align-items: center; justify-content: center;
  }
  #lightbox.open { display: flex; }
  #lightbox-img {
    max-width: 92vw; max-height: 92vh; object-fit: contain; border-radius: 4px;
    pointer-events: none; transition: opacity 0.22s ease;
  }
  #lightbox-img.fading { opacity: 0; }
  @media (max-width: 680px) and (orientation: portrait) {
    #lightbox-img { transform: rotate(90deg); max-width: 92vh; max-height: 92vw; }
  }
  #lightbox-model {
    position: fixed; top: 18px; left: 20px; font-size: 14px; font-weight: 700; color: #fff;
    text-shadow: 0 1px 4px rgba(0,0,0,0.6); pointer-events: none; z-index: 102;
  }
  #lightbox-close {
    position: fixed; top: 14px; right: 16px; width: 34px; height: 34px; border-radius: 50%;
    border: 1.5px solid rgba(255,255,255,0.22); background: rgba(20,20,20,0.8); backdrop-filter: blur(6px);
    color: #fff; display: flex; align-items: center; justify-content: center;
    cursor: pointer; z-index: 102; font-size: 13px; font-weight: 500;
    transition: border-color 0.2s, background 0.2s;
  }
  #lightbox-close:hover { border-color: var(--accent); background: var(--accent-dim); }
  .lb-arrow {
    position: fixed; top: 50%; transform: translateY(-50%);
    z-index: 102; width: 44px; height: 44px; border-radius: 50%;
    border: 1.5px solid rgba(255,255,255,0.16); background: rgba(12,12,12,0.75); backdrop-filter: blur(8px);
    color: #fff; display: flex; align-items: center; justify-content: center; cursor: pointer;
    transition: border-color 0.2s, background 0.2s, opacity 0.2s, transform 0.15s;
  }
  .lb-arrow:hover:not(:disabled) { border-color: var(--accent); background: var(--accent-dim); transform: translateY(-50%) scale(1.06); }
  .lb-arrow:disabled { opacity: 0.15; cursor: default; pointer-events: none; }
  .lb-arrow svg { width: 20px; height: 20px; }
  #lb-prev { left: 16px; }
  #lb-next { right: 16px; }
  #lb-dots { position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%); display: flex; gap: 8px; z-index: 102; }
  .lb-dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.25); transition: background 0.2s, transform 0.2s; cursor: pointer; }
  .lb-dot.active { background: var(--accent); transform: scale(1.4); }

  /* ── KEYBOARD HINT ── */
  .key-hint { position: fixed; bottom: 10px; right: 14px; font-size: 10px; color: rgba(255,255,255,0.12); letter-spacing: 0.05em; pointer-events: none; }

  /* ── MOBILE ── */
  @media (max-width: 680px) {
    header { padding: 10px 12px 6px; gap: 6px; }
    .colour-card { padding: 7px 10px; }
    .colour-card-name { font-size: 11px; }
    .colour-card-name2 { font-size: 9px; }
    .comparison { flex-direction: column; padding: 0 12px 10px; gap: 6px; overflow: visible; }
    .model-panel { flex: 1 1 0; }
    .specs-heading { font-size: 13px; margin-bottom: 8px; }
    .specs-list li { font-size: 10px; gap: 5px; }
    .specs-list li::before { font-size: 6px; margin-top: 3px; }
    .specs-overlay { padding: 14px 12px 14px 15%; }
    .key-hint { display: none; }
    #lb-prev { left: 8px; }
    #lb-next { right: 8px; }
  }
</style>
</head>

    'front-side':{ black: 'Black/n front side black.jpeg',    ecotronic: 'Ecotronic/n front side ecotronic.jpeg',         cyber: 'Cyber Grey/n front side cyber grey.jpeg',         red: 'red/n front side red.jpeg'         },
    'side':      { black: 'Black/n side black.jpeg',          ecotronic: 'Ecotronic/n side ecotronic.jpeg',               cyber: 'Cyber Grey/n side cyber grey.jpeg',               red: 'red/n side red.jpeg'               },
    'rear-side': { black: 'Black/n rear side black.jpeg',     ecotronic: 'Ecotronic/n back side ecotronic.jpeg',          cyber: 'Cyber Grey/n back side cyber grey.jpeg',          red: 'red/n back side red.jpeg'          },
    'rear':      { black: 'Black/n rear black.jpeg',          ecotronic: 'Ecotronic/n rear ecotronic.jpeg',               cyber: 'Cyber Grey/n rear cyber grey.jpeg',               red: 'red/n rear red.jpeg'               },
    'dash':      { black: 'n dash.jpeg',         ecotronic: 'n dash.jpeg',         cyber: 'n dash.jpeg',         red: 'n dash.jpeg'         },
    'seats':     { black: 'n seats.jpeg',        ecotronic: 'n seats.jpeg',        cyber: 'n seats.jpeg',        red: 'n seats.jpeg'        },
    'specs':     { black: 'Black/n side black.jpeg',          ecotronic: 'Ecotronic/n side ecotronic.jpeg',               cyber: 'Cyber Grey/n side cyber grey.jpeg',               red: 'red/n side red.jpeg'               },
  },
};

// ── STATE ─────────────────────────────────────────────────────────────────────
let currentView   = 0;
let currentColour = 'ecotronic';
let compareMode   = 'models';
let pickedModel   = 'ultimate';
let isAnimating   = false;
let lbPanelIdx    = 0;
let lbAnimating   = false;
// Which 3 colours are shown in Colours mode (max 3); tracked in activation order for LRU swap
let activeColours     = ['black', 'ecotronic', 'cyber'];
let colourActivation  = ['black', 'ecotronic', 'cyber']; // LRU order: oldest first

// ── AVAILABLE VIEWS ───────────────────────────────────────────────────────────
function getAvailableViews() {
  return VIEWS.filter(v => {
    // Models mode = 1 model / 3 colours: exclude interior (same image 3×) and specs
    if (compareMode === 'models' && (v.interior || v.modelsOnly)) return false;
    return true;
  });
}

// ── PANELS ────────────────────────────────────────────────────────────────────
function getPanels() {
  if (compareMode === 'models') {
    // Picked model shown in the 3 active colours — panels labelled with colour names
    return COLOURS.filter(c => activeColours.includes(c.key)).map(c => {
      const label = (pickedModel === 'n' && c.name5n) ? c.name5n : c.name;
      return {
        id: `colour-${c.key}`, label,
        modelId: pickedModel,
        colourKey: c.key,
        getImage: (viewKey) => images[pickedModel][viewKey][c.key],
      };
    });
  }
  // One colour (currentColour) shown across 3 models — panels labelled with model names
  return MODELS.map(m => ({
    id: m.id, label: m.name,
    modelId: m.id,
    colourKey: currentColour,
    getImage: (viewKey) => images[m.id][viewKey][currentColour],
  }));
}

// ── COLOUR SWATCH TOGGLE (Colours mode) ───────────────────────────────────────
// Max 3 active. Clicking an inactive swatch swaps out the LRU active colour.
function toggleActiveColour(key) {
  if (activeColours.includes(key)) return; // already active — no deselect (keep 3)
  // Remove oldest activated colour
  const evict = colourActivation.shift();
  activeColours = activeColours.filter(k => k !== evict);
  // Add new colour
  activeColours.push(key);
  colourActivation.push(key);
  renderSelector();
  buildPanels();
  render();
}

// ── SELECTOR AREA ─────────────────────────────────────────────────────────────
function renderSelector() {
  const area = document.getElementById('selectorArea');
  if (compareMode === 'models') {
    // Flex column: model slate row + colour swatch row (pick which 3 of 4 to show)
    area.style.display = 'flex';
    area.style.flexDirection = 'column';
    area.style.gridTemplateColumns = '';
    area.style.gap = '6px';
    area.innerHTML = `
      <div style="display:flex;gap:8px">
        ${MODELS.map(m => `
          <div class="model-slate model-slate-${m.id}${pickedModel === m.id ? ' active' : ''}"
               onclick="setPickedModel('${m.id}')">
            <div class="model-slate-name">${m.name}</div>
          </div>
        `).join('')}
      </div>
      <div class="colour-swatches-row">
        ${COLOURS.map(c => {
          const on = activeColours.includes(c.key);
          return `<div class="colour-swatch ${c.key}-card${on ? ' swatch-active' : ''}"
                       onclick="toggleActiveColour('${c.key}')">
            ${on ? `<svg class="swatch-tick" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="2 6 5 9 10 3"/></svg>` : ''}
          </div>`;
        }).join('')}
      </div>`;
  } else {
    // 2×2 grid of colour cards with names
    area.style.display = 'grid';
    area.style.flexDirection = '';
    area.style.gridTemplateColumns = '1fr 1fr';
    area.style.gap = '6px';
    area.innerHTML = COLOURS.map(c => `
      <div class="colour-card ${c.key}-card${currentColour === c.key ? ' active' : ''}"
           style="padding:6px 10px;min-height:0;"
           data-colour="${c.key}" onclick="setColour('${c.key}')">
        <div class="colour-card-name" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${c.name}</div>
        ${c.name5n ? `<div class="colour-card-name2" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${c.name5n}</div>` : ''}
        <div class="active-tick">${TICK_SVG}</div>
      </div>
    `).join('');
  }
}

// ── BUILD ──────────────────────────────────────────────────────────────────────
function buildPanels() {
  const grid   = document.getElementById('comparison');
  const panels = getPanels();
  grid.innerHTML = '';

  panels.forEach((panel, idx) => {
    const isMiddle = idx === 1;
    const spec     = panel.modelId ? SPECS[panel.modelId] : null;

    const el = document.createElement('div');
    el.className = 'model-panel';
    el.id = `panel-${idx}`;

    const specsHtml = spec ? `
      <div class="specs-overlay" id="specs-${idx}">
        <div class="specs-heading">${spec.heading}<span style="font-size:11px;font-weight:400;color:rgba(255,255,255,0.55);margin-left:9px;">(key specification items)</span></div>
        <ul class="specs-list">
          ${spec.items.map(i => `<li><span>${i}</span></li>`).join('')}
        </ul>
      </div>
    ` : '';

    el.innerHTML = `
      <div class="image-wrap" id="wrap-${idx}">
        <div class="panel-label" id="plabel-${idx}">${panel.label}</div>
        <img class="panel-logo" id="logo-${idx}" src="hyundailogo.png" alt="">
        ${isMiddle ? `
          <button class="panel-arrow panel-arrow-left" id="btnPrev" onclick="changeView(-1)" aria-label="Previous">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
          </button>
          <button class="panel-arrow panel-arrow-right" id="btnNext" onclick="changeView(1)" aria-label="Next">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
          </button>
        ` : ''}
        <img class="car-img" id="img-${idx}" src="" alt="${panel.label}" draggable="false" onclick="openLightbox(${idx})">
        <div class="missing-placeholder" id="missing-${idx}" style="display:none">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="21" x2="21" y2="3"/></svg>
          <p>Image not available</p>
        </div>
        ${specsHtml}
      </div>
    `;
    grid.appendChild(el);
  });

  rebuildLbDots();
}

function rebuildLbDots() {
  const dotsEl = document.getElementById('lb-dots');
  dotsEl.innerHTML = '';
  getPanels().forEach((_, i) => {
    const dot = document.createElement('div');
    dot.className = 'lb-dot' + (i === 0 ? ' active' : '');
    dot.onclick = () => lbGoto(i);
    dotsEl.appendChild(dot);
  });
}

// ── OVERLAY POSITIONING ───────────────────────────────────────────────────────
// Positions label (top-left) and logo (top-right) within the actual rendered
// image content, not the panel box. Needed because object-fit:contain leaves
// black bars (portrait images in landscape panels create large side gaps).
function positionOverlays(idx) {
  const img   = document.getElementById(`img-${idx}`);
  const wrap  = document.getElementById(`wrap-${idx}`);
  const label = document.getElementById(`plabel-${idx}`);
  const logo  = document.getElementById(`logo-${idx}`);
  if (!img || !wrap || !img.naturalWidth || !img.naturalHeight) return;

  const ww = wrap.clientWidth, wh = wrap.clientHeight;
  const pad = 0;
  const availW = ww - pad * 2, availH = wh - pad * 2;
  const scale  = Math.min(availW / img.naturalWidth, availH / img.naturalHeight);
  const rw     = img.naturalWidth  * scale;
  const rh     = img.naturalHeight * scale;
  const ox     = (availW - rw) / 2 + pad; // left edge of rendered image within wrap
  const oy     = (availH - rh) / 2 + pad; // top edge of rendered image within wrap

  const inset = 10;
  const imgBottom = wh - (oy + rh); // distance from wrap bottom to image bottom edge
  if (label) {
    label.style.left      = (ox + rw / 2) + 'px';
    label.style.transform = 'translateX(-50%)';
    label.style.bottom    = (imgBottom + rh * 0.025) + 'px';
    label.style.top       = 'auto';
  }
  if (logo) {
    logo.style.right = (ww - ox - rw + inset) + 'px';
    logo.style.left  = 'auto';
    logo.style.top   = (oy + inset) + 'px';
  }
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function render() {
  const view   = VIEWS[currentView];
  const panels = getPanels();
  const isSpecs = view.key === 'specs';

  // Both arrows always enabled — full circular navigation
  const prev = document.getElementById('btnPrev');
  const next = document.getElementById('btnNext');
  if (prev) prev.disabled = false;
  if (next) next.disabled = false;

  panels.forEach((panel, idx) => {
    const filename = panel.getImage(view.key);

    const img     = document.getElementById(`img-${idx}`);
    const missing = document.getElementById(`missing-${idx}`);
    const label   = document.getElementById(`plabel-${idx}`);
    const specs   = document.getElementById(`specs-${idx}`);

    const logo = document.getElementById(`logo-${idx}`);
    if (label) {
      label.textContent = panel.label;
      label.style.display = isSpecs ? 'none' : '';
      // Interior images are dark — keep label white; exterior images are white — use black
      label.classList.toggle('label-interior', view.interior);
    }
    if (logo) logo.style.display = isSpecs ? 'none' : '';

    // Specs view: show dimmed side image + specs overlay
    if (isSpecs && specs) {
      img.classList.add('dimmed');
      img.style.display     = 'block';
      missing.style.display = 'none';
      img.src = filename || '';
      img.style.cursor = 'default';
      specs.classList.add('visible');
      if (img.complete && img.naturalWidth) positionOverlays(idx);
      else img.onload = () => positionOverlays(idx);
    } else {
      img.classList.remove('dimmed');
      img.style.cursor = 'zoom-in';
      if (specs) specs.classList.remove('visible');
      if (filename) {
        img.style.display     = 'block';
        missing.style.display = 'none';
        img.src = filename;
        // Position label/logo over actual image content once dimensions are known
        if (img.complete && img.naturalWidth) {
          positionOverlays(idx);
        } else {
          img.onload = () => positionOverlays(idx);
        }
      } else {
        img.style.display     = 'none';
        missing.style.display = 'flex';
      }
    }
  });
}

// ── ANIMATION ─────────────────────────────────────────────────────────────────
function animateTransition(direction, callback) {
  if (isAnimating) return false;
  isAnimating = true;
  const imgs = document.querySelectorAll('.car-img');
  const outX = direction > 0 ? '-14px' : '14px';
  const inX  = direction > 0 ?  '14px' : '-14px';
  imgs.forEach(img => {
    img.style.transition = 'opacity 0.2s ease, transform 0.2s ease';
    img.style.opacity = '0'; img.style.transform = `translateX(${outX})`;
  });
  setTimeout(() => {
    callback();
    imgs.forEach(img => {
      img.style.transform = `translateX(${inX})`;
      img.getBoundingClientRect();
      img.style.transition = 'opacity 0.27s ease, transform 0.27s ease';
      img.style.opacity = '1'; img.style.transform = 'translateX(0)';
    });
    setTimeout(() => {
      imgs.forEach(img => { img.style.transition = img.style.opacity = img.style.transform = ''; });
      isAnimating = false;
    }, 280);
  }, 190);
  return true;
}

// ── CONTROLS ──────────────────────────────────────────────────────────────────
function changeView(delta) {
  const views = getAvailableViews();
  const currentKey = VIEWS[currentView].key;
  let availIdx = views.findIndex(v => v.key === currentKey);
  if (availIdx === -1) availIdx = 0;
  let nextIdx = availIdx + delta;
  // Full circular — both directions
  if (nextIdx >= views.length) nextIdx = 0;
  if (nextIdx < 0)             nextIdx = views.length - 1;
  const nextViewIdx = VIEWS.findIndex(v => v.key === views[nextIdx].key);
  animateTransition(delta, () => { currentView = nextViewIdx; render(); });
}

function setColour(colour) {
  if (colour === currentColour) return;
  const imgs = document.querySelectorAll('.car-img');
  imgs.forEach(img => { img.style.transition = 'opacity 0.17s ease'; img.style.opacity = '0'; });
  document.querySelectorAll('.colour-card').forEach(c => c.classList.toggle('active', c.dataset.colour === colour));
  setTimeout(() => {
    currentColour = colour;
    render();
    imgs.forEach(img => { img.style.opacity = '1'; setTimeout(() => { img.style.transition = ''; }, 220); });
  }, 150);
}

function setMode(mode) {
  if (mode === compareMode) return;
  compareMode = mode;
  document.querySelectorAll('.compare-tab').forEach(t => t.classList.toggle('active', t.dataset.mode === mode));
  // Reset to front if current view isn't available in new mode
  const avail = getAvailableViews();
  if (!avail.find(v => v.key === VIEWS[currentView].key)) currentView = 0;
  renderSelector();
  buildPanels();
  render();
  // Force layout recalculation — fixes mobile flex column not distributing panels
  const grid = document.getElementById('comparison');
  grid.style.display = 'none';
  grid.offsetHeight;
  grid.style.display = '';
}

function setPickedModel(modelId) {
  pickedModel = modelId;
  // Update model slate active state
  document.querySelectorAll('.model-slate').forEach(s => s.classList.toggle('active', s.classList.contains(`model-slate-${modelId}`)));
  // Always re-render panels (models mode shows the newly picked model in 3 colours)
  const imgs = document.querySelectorAll('.car-img');
  imgs.forEach(img => { img.style.transition = 'opacity 0.17s ease'; img.style.opacity = '0'; });
  setTimeout(() => {
    render();
    imgs.forEach(img => { img.style.opacity = '1'; setTimeout(() => { img.style.transition = ''; }, 220); });
  }, 150);
}

// ── LIGHTBOX ──────────────────────────────────────────────────────────────────
function lbRender() {
  const panels = getPanels();
  const panel  = panels[lbPanelIdx];
  const view   = VIEWS[currentView];
  // Don't open lightbox on specs view
  const filename = panel.getImage(view.key);
  document.getElementById('lightbox-model').textContent = panel.label;
  const img = document.getElementById('lightbox-img');
  img.src = filename || '';
  img.style.visibility = filename ? 'visible' : 'hidden';
  document.getElementById('lb-prev').disabled = lbPanelIdx === 0;
  document.getElementById('lb-next').disabled = lbPanelIdx === panels.length - 1;
  document.querySelectorAll('.lb-dot').forEach((d, i) => d.classList.toggle('active', i === lbPanelIdx));
}

function openLightbox(panelIdx) {
  if (VIEWS[currentView].key === 'specs') return; // no lightbox on specs
  lbPanelIdx = panelIdx;
  lbRender();
  document.getElementById('lightbox').classList.add('open');
}

function closeLightbox() { document.getElementById('lightbox').classList.remove('open'); }

function lbNavigate(delta) {
  const panels = getPanels();
  const next = lbPanelIdx + delta;
  if (next < 0 || next >= panels.length || lbAnimating) return;
  lbAnimating = true;
  const img = document.getElementById('lightbox-img');
  img.classList.add('fading');
  setTimeout(() => {
    lbPanelIdx = next;
    lbRender();
    img.classList.remove('fading');
    setTimeout(() => { lbAnimating = false; }, 220);
  }, 200);
}

function lbGoto(idx) { if (idx !== lbPanelIdx) lbNavigate(idx > lbPanelIdx ? 1 : -1); }

// ── INPUT ─────────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  const lbOpen = document.getElementById('lightbox').classList.contains('open');
  if (e.key === 'Escape') { closeLightbox(); return; }
  if (lbOpen) {
    if (e.key === 'ArrowLeft')  lbNavigate(-1);
    if (e.key === 'ArrowRight') lbNavigate(1);
  } else {
    if (e.key === 'ArrowLeft')  changeView(-1);
    if (e.key === 'ArrowRight') changeView(1);
    if (e.key === '1') setColour('black');
    if (e.key === '2') setColour('ecotronic');
    if (e.key === '3') setColour('cyber');
    if (e.key === '4') setColour('red');
  }
});

document.getElementById('lightbox').addEventListener('click', e => {
  if (e.target === document.getElementById('lightbox') || e.target === document.getElementById('lightbox-img')) closeLightbox();
});

let tx = null;
document.addEventListener('touchstart', e => { tx = e.touches[0].clientX; }, { passive: true });
document.addEventListener('touchend', e => {
  if (tx === null) return;
  const dx = e.changedTouches[0].clientX - tx;
  tx = null;
  if (Math.abs(dx) < 48) return;
  if (document.getElementById('lightbox').classList.contains('open')) lbNavigate(dx < 0 ? 1 : -1);
  else changeView(dx < 0 ? 1 : -1);
}, { passive: true });

renderSelector();
buildPanels();
render();
</script>
</body>
</html>
