<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Hyundai Ioniq 5 · 2026</title>
<style>
  :root {
    --bg: #080808;
    --surface: #111111;
    --border: rgba(255,255,255,0.08);
    --text: #f0f0f0;
    --text-muted: #888;
    --accent: #c8a96e;
    --accent-dim: rgba(200,169,110,0.12);
    --radius: 12px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { height: 100%; overflow: hidden; }
  body {
    height: 100%; overflow: hidden;
    background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    display: flex; flex-direction: column;
  }

  /* ── HEADER ── */
  header {
    flex-shrink: 0;
    padding: 12px 20px 10px;
    display: flex; flex-direction: column; gap: 8px;
  }

  .brand-row { display: flex; align-items: baseline; gap: 8px; }
  .brand-title {
    font-size: 12px; font-weight: 700;
    letter-spacing: 0.16em; text-transform: uppercase; color: var(--text);
  }
  .brand-year { font-size: 12px; font-weight: 400; letter-spacing: 0.06em; color: var(--text-muted); }

  /* ── COLOUR SELECTOR ── */
  .colour-selector {
    display: flex; align-items: center; gap: 10px;
  }

  .colour-card {
    padding: 9px 14px;
    border-radius: var(--radius);
    border: 2px solid transparent;
    cursor: pointer;
    transition: border-color 0.25s ease, transform 0.15s ease, box-shadow 0.25s ease;
    user-select: none; position: relative; overflow: hidden;
    flex: 1; max-width: 200px;
  }
  .colour-card:hover { transform: translateY(-1px); }
  .colour-card.active {
    border-color: rgba(255,255,255,0.6);
    box-shadow: 0 0 0 1px rgba(255,255,255,0.15), 0 4px 20px rgba(0,0,0,0.5);
  }
  .colour-card.ecotronic-card {
    background: linear-gradient(145deg, #7a7f78 0%, #5e6359 40%, #444840 100%);
  }
  .colour-card.cyber-card {
    background: linear-gradient(145deg, #d0d4d8 0%, #b0b6bc 40%, #8e9399 100%);
  }
  .colour-card-name {
    font-size: 13px; font-weight: 700; color: #fff; line-height: 1.25;
    text-shadow:
      -0.5px -0.5px 0 #000,  0.5px -0.5px 0 #000,
      -0.5px  0.5px 0 #000,  0.5px  0.5px 0 #000,
       0 2px 6px rgba(0,0,0,0.35);
  }
  .active-tick {
    position: absolute; top: 8px; right: 10px;
    width: 16px; height: 16px;
    background: rgba(255,255,255,0.2); border: 1.5px solid rgba(255,255,255,0.5);
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    opacity: 0; transition: opacity 0.2s ease;
  }
  .colour-card.active .active-tick { opacity: 1; }
  .active-tick svg { width: 8px; height: 8px; color: #fff; }

  /* ── HYUNDAI LOGO ── */
  .hyundai-logo {
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    padding: 0 4px;
  }
  .hyundai-logo img {
    height: 36px; width: auto;
    opacity: 0.6;
    transition: opacity 0.2s ease;
    filter: brightness(0) invert(1);
  }
  .hyundai-logo:hover img { opacity: 0.85; }

  /* ── COMPARISON AREA ── */
  .comparison {
    flex: 1; display: flex; gap: 8px;
    padding: 0 20px 14px;
    min-height: 0; overflow: hidden;
  }

  .model-panel {
    flex: 1; display: flex; flex-direction: column;
    background: var(--surface); border-radius: var(--radius);
    overflow: hidden; min-height: 0;
    border: 1px solid var(--border); position: relative;
  }

  .model-header {
    padding: 8px 12px 7px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .model-name { font-size: 13px; font-weight: 700; color: var(--text); }

  .image-wrap {
    flex: 1; position: relative; overflow: hidden;
    background: #0c0c0c; min-height: 0;
  }

  .car-img {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: contain; padding: 8px;
    will-change: opacity, transform;
    cursor: zoom-in;
  }

  .missing-placeholder {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 8px; opacity: 0.2;
  }
  .missing-placeholder svg { width: 32px; height: 32px; }
  .missing-placeholder p { font-size: 10px; color: var(--text-muted); }

  /* ── PANEL ARROWS (N Line S only) ── */
  .panel-arrow {
    position: absolute; top: 50%; transform: translateY(-50%);
    z-index: 5; width: 36px; height: 36px; border-radius: 50%;
    border: 1.5px solid rgba(255,255,255,0.14);
    background: rgba(8,8,8,0.72); backdrop-filter: blur(6px);
    color: var(--text);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s, opacity 0.2s, transform 0.15s;
  }
  .panel-arrow:hover:not(:disabled) {
    border-color: var(--accent); background: var(--accent-dim);
    transform: translateY(-50%) scale(1.08);
  }
  .panel-arrow:disabled { opacity: 0.18; cursor: default; pointer-events: none; }
  .panel-arrow svg { width: 18px; height: 18px; }
  .panel-arrow-left  { left: 8px; }
  .panel-arrow-right { right: 8px; }

  /* ── LIGHTBOX ── */
  #lightbox {
    display: none; position: fixed; inset: 0; z-index: 100;
    background: rgba(0,0,0,0.96);
    align-items: center; justify-content: center;
  }
  #lightbox.open { display: flex; }

  #lightbox-img {
    max-width: 92vw; max-height: 92vh;
    object-fit: contain; border-radius: 4px;
    pointer-events: none;
    transition: opacity 0.22s ease;
  }
  #lightbox-img.fading { opacity: 0; }

  /* Mobile portrait: rotate 90° */
  @media (max-width: 680px) and (orientation: portrait) {
    #lightbox-img {
      transform: rotate(90deg);
      max-width: 92vh; max-height: 92vw;
    }
  }

  /* Model name — top left */
  #lightbox-model {
    position: fixed; top: 18px; left: 20px;
    font-size: 14px; font-weight: 700; color: #fff;
    letter-spacing: 0.04em;
    text-shadow: 0 1px 4px rgba(0,0,0,0.6);
    pointer-events: none;
    z-index: 102;
  }

  /* Close button — top right */
  #lightbox-close {
    position: fixed; top: 14px; right: 16px;
    width: 34px; height: 34px; border-radius: 50%;
    border: 1.5px solid rgba(255,255,255,0.22);
    background: rgba(20,20,20,0.8); backdrop-filter: blur(6px);
    color: #fff; display: flex; align-items: center; justify-content: center;
    cursor: pointer; z-index: 102;
    transition: border-color 0.2s, background 0.2s;
    font-size: 13px; font-weight: 500; letter-spacing: 0.02em;
  }
  #lightbox-close:hover { border-color: var(--accent); background: var(--accent-dim); }

  /* Lightbox prev/next */
  .lb-arrow {
    position: fixed; top: 50%; transform: translateY(-50%);
    z-index: 102; width: 44px; height: 44px; border-radius: 50%;
    border: 1.5px solid rgba(255,255,255,0.16);
    background: rgba(12,12,12,0.75); backdrop-filter: blur(8px);
    color: #fff; display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s, opacity 0.2s, transform 0.15s;
  }
  .lb-arrow:hover:not(:disabled) {
    border-color: var(--accent); background: var(--accent-dim);
    transform: translateY(-50%) scale(1.06);
  }
  .lb-arrow:disabled { opacity: 0.15; cursor: default; pointer-events: none; }
  .lb-arrow svg { width: 20px; height: 20px; }
  #lb-prev { left: 16px; }
  #lb-next { right: 16px; }

  /* Model counter dots — bottom centre */
  #lb-dots {
    position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 8px; z-index: 102;
  }
  .lb-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: rgba(255,255,255,0.25);
    transition: background 0.2s, transform 0.2s;
    cursor: pointer;
  }
  .lb-dot.active { background: var(--accent); transform: scale(1.4); }

  /* ── KEYBOARD HINT ── */
  .key-hint {
    position: fixed; bottom: 10px; right: 14px;
    font-size: 10px; color: rgba(255,255,255,0.12);
    letter-spacing: 0.05em; pointer-events: none;
  }

  /* ── MOBILE ── */
  @media (max-width: 680px) {
    header { padding: 8px 12px 8px; gap: 7px; }
    .colour-card { padding: 8px 10px; }
    .colour-card-name { font-size: 11px; }
    .hyundai-logo svg { width: 28px; height: 28px; }
    .comparison { flex-direction: column; padding: 0 12px 10px; gap: 6px; }
    .key-hint { display: none; }
    #lb-prev { left: 8px; }
    #lb-next { right: 8px; }
  }
</style>
</head>
<body>

<header>
  <div class="brand-row">
    <span class="brand-title">Hyundai Ioniq 5</span>
    <span class="brand-year">· 2026 Current Model</span>
  </div>
  <div class="colour-selector">
    <div class="colour-card ecotronic-card active" data-colour="ecotronic" onclick="setColour('ecotronic')">
      <div class="active-tick">
        <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="2 6 5 9 10 3"/></svg>
      </div>
      <div class="colour-card-name">Ecotronic Grey Pearl</div>
    </div>

    <!-- Hyundai logo -->
    <div class="hyundai-logo">
      <img src="hyundailogo.png" alt="Hyundai">
    </div>

    <div class="colour-card cyber-card" data-colour="cyber" onclick="setColour('cyber')">
      <div class="active-tick">
        <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="2 6 5 9 10 3"/></svg>
      </div>
      <div class="colour-card-name">Cyber Grey Metallic</div>
    </div>
  </div>
</header>

<div class="comparison" id="comparison"></div>

<!-- Lightbox -->
<div id="lightbox">
  <div id="lightbox-model"></div>

  <button class="lb-arrow" id="lb-prev" onclick="lbNavigate(-1)" aria-label="Previous model">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
  </button>

  <img id="lightbox-img" src="" alt="">

  <button class="lb-arrow" id="lb-next" onclick="lbNavigate(1)" aria-label="Next model">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
  </button>

  <button id="lightbox-close" onclick="closeLightbox()" aria-label="Close">✕</button>

  <div id="lb-dots"></div>
</div>

<div class="key-hint">← → angle · tap image to expand</div>

<script>
const VIEWS = [
  { label: 'Front',      key: 'front'      },
  { label: 'Front Side', key: 'front-side' },
  { label: 'Side',       key: 'side'       },
  { label: 'Rear Side',  key: 'rear-side'  },
  { label: 'Rear',       key: 'rear'       },
];

const MODELS = [
  { id: 'ultimate', name: 'Ultimate' },
  { id: 'nline',    name: 'N Line S' },
  { id: 'n',        name: '5 N'      },
];

const images = {
  ultimate: {
    'front':      { ecotronic: 'ultimate front ecotronic.jpeg',      cyber: 'ultimate front cyber grey.jpeg'      },
    'front-side': { ecotronic: 'ultimate front side ecotronic.jpeg',  cyber: 'ultimate front side cyber grey.jpeg' },
    'side':       { ecotronic: 'ultimate side ecotronic.jpeg',        cyber: 'ultimate side cyber grey.jpeg'       },
    'rear-side':  { ecotronic: 'ultimate rear side ecotronic.jpeg',   cyber: 'ultimate rear side cyber grey.jpeg'  },
    'rear':       { ecotronic: 'ultimate rear ecotronic.jpeg',        cyber: 'ultimate rear cyber grey.jpeg'       },
  },
  nline: {
    'front':      { ecotronic: 'n line front ecotronic.jpeg',         cyber: 'n line front cyber grey.jpeg'       },
    'front-side': { ecotronic: 'n line front side ecotronic.jpeg',    cyber: 'n line front side cyber grey.jpeg'  },
    'side':       { ecotronic: 'n line side ecotronic.jpeg',          cyber: 'n line side cyber grey.jpeg'        },
    'rear-side':  { ecotronic: 'n line rear side ecotronic.jpeg',     cyber: 'n line rear side cyber grey.jpeg'   },
    'rear':       { ecotronic: 'n line rear ecotronic.jpeg',          cyber: 'n line rear cyber grey.jpeg'        },
  },
  n: {
    'front':      { ecotronic: 'n front ecotronic.jpeg',              cyber: 'n front cyber grey.jpeg'            },
    'front-side': { ecotronic: 'n front side ecotronic.jpeg',         cyber: 'n front side cyber grey.jpeg'       },
    'side':       { ecotronic: 'n side ecotronic.jpeg',               cyber: 'n side cyber grey.jpeg'             },
    'rear-side':  { ecotronic: 'n back side ecotronic.jpeg',          cyber: 'n back side cyber grey.jpeg'        },
    'rear':       { ecotronic: 'n rear ecotronic.jpeg',               cyber: 'n rear cyber grey.jpeg'             },
  },
};

let currentView   = 0;
let currentColour = 'ecotronic';
let isAnimating   = false;

// Lightbox state
let lbModelIdx   = 0;
let lbAnimating  = false;

// ── BUILD ──────────────────────────────────────────────────────────────────────
function init() {
  const grid = document.getElementById('comparison');
  grid.innerHTML = '';

  MODELS.forEach((model, idx) => {
    const isMiddle = idx === 1;
    const panel = document.createElement('div');
    panel.className = 'model-panel';
    panel.id = `panel-${model.id}`;

    panel.innerHTML = `
      <div class="model-header">
        <div class="model-name">${model.name}</div>
      </div>
      <div class="image-wrap" id="wrap-${model.id}">
        ${isMiddle ? `
          <button class="panel-arrow panel-arrow-left" id="btnPrev" onclick="changeView(-1)" aria-label="Previous">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
          </button>
          <button class="panel-arrow panel-arrow-right" id="btnNext" onclick="changeView(1)" aria-label="Next">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
          </button>
        ` : ''}
        <img class="car-img" id="img-${model.id}" src="" alt="${model.name}" draggable="false"
             onclick="openLightbox(${idx})">
        <div class="missing-placeholder" id="missing-${model.id}" style="display:none">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="21" x2="21" y2="3"/>
          </svg>
          <p>Image not available</p>
        </div>
      </div>
    `;
    grid.appendChild(panel);
  });

  // Build lightbox dots
  const dotsEl = document.getElementById('lb-dots');
  MODELS.forEach((m, i) => {
    const dot = document.createElement('div');
    dot.className = 'lb-dot' + (i === 0 ? ' active' : '');
    dot.onclick = () => lbGoto(i);
    dotsEl.appendChild(dot);
  });

  render();
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function render() {
  const view = VIEWS[currentView];
  const prev = document.getElementById('btnPrev');
  const next = document.getElementById('btnNext');
  if (prev) prev.disabled = currentView === 0;
  if (next) next.disabled = currentView === VIEWS.length - 1;

  MODELS.forEach(model => {
    const filename = images[model.id][view.key][currentColour];
    const img      = document.getElementById(`img-${model.id}`);
    const missing  = document.getElementById(`missing-${model.id}`);
    if (filename) {
      img.style.display = 'block';
      missing.style.display = 'none';
      img.src = filename;
    } else {
      img.style.display = 'none';
      missing.style.display = 'flex';
    }
  });
}

// ── ANIMATION ─────────────────────────────────────────────────────────────────
function animateTransition(direction, callback) {
  if (isAnimating) return false;
  isAnimating = true;
  const imgs = document.querySelectorAll('.car-img');
  const outX = direction > 0 ? '-14px' : '14px';
  const inX  = direction > 0 ?  '14px' : '-14px';
  imgs.forEach(img => {
    img.style.transition = 'opacity 0.2s ease, transform 0.2s ease';
    img.style.opacity = '0'; img.style.transform = `translateX(${outX})`;
  });
  setTimeout(() => {
    callback();
    imgs.forEach(img => {
      img.style.transform = `translateX(${inX})`;
      img.getBoundingClientRect();
      img.style.transition = 'opacity 0.27s ease, transform 0.27s ease';
      img.style.opacity = '1'; img.style.transform = 'translateX(0)';
    });
    setTimeout(() => {
      imgs.forEach(img => { img.style.transition = img.style.opacity = img.style.transform = ''; });
      isAnimating = false;
    }, 280);
  }, 190);
  return true;
}

function changeView(delta) {
  const next = currentView + delta;
  if (next < 0 || next >= VIEWS.length) return;
  animateTransition(delta, () => { currentView = next; render(); });
}

function setColour(colour) {
  if (colour === currentColour) return;
  const imgs = document.querySelectorAll('.car-img');
  imgs.forEach(img => { img.style.transition = 'opacity 0.17s ease'; img.style.opacity = '0'; });
  document.querySelectorAll('.colour-card').forEach(c => c.classList.toggle('active', c.dataset.colour === colour));
  setTimeout(() => {
    currentColour = colour;
    render();
    imgs.forEach(img => { img.style.opacity = '1'; setTimeout(() => { img.style.transition = ''; }, 220); });
  }, 150);
}

// ── LIGHTBOX ──────────────────────────────────────────────────────────────────
function lbRender() {
  const model    = MODELS[lbModelIdx];
  const view     = VIEWS[currentView];
  const filename = images[model.id][view.key][currentColour];

  document.getElementById('lightbox-model').textContent = model.name;

  const img = document.getElementById('lightbox-img');
  img.src = filename || '';
  img.style.visibility = filename ? 'visible' : 'hidden';

  document.getElementById('lb-prev').disabled = lbModelIdx === 0;
  document.getElementById('lb-next').disabled = lbModelIdx === MODELS.length - 1;

  document.querySelectorAll('.lb-dot').forEach((d, i) => {
    d.classList.toggle('active', i === lbModelIdx);
  });
}

function openLightbox(modelIdx) {
  lbModelIdx = modelIdx;
  lbRender();
  document.getElementById('lightbox').classList.add('open');
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
}

function lbNavigate(delta) {
  const next = lbModelIdx + delta;
  if (next < 0 || next >= MODELS.length || lbAnimating) return;
  lbAnimating = true;
  const img = document.getElementById('lightbox-img');
  img.classList.add('fading');
  setTimeout(() => {
    lbModelIdx = next;
    lbRender();
    img.classList.remove('fading');
    setTimeout(() => { lbAnimating = false; }, 220);
  }, 200);
}

function lbGoto(idx) {
  if (idx === lbModelIdx) return;
  lbNavigate(idx > lbModelIdx ? 1 : -1);
  // For multi-step jumps, recurse after animation
}

// ── INPUT ─────────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  const lbOpen = document.getElementById('lightbox').classList.contains('open');
  if (e.key === 'Escape')     { closeLightbox(); return; }
  if (lbOpen) {
    if (e.key === 'ArrowLeft')  lbNavigate(-1);
    if (e.key === 'ArrowRight') lbNavigate(1);
  } else {
    if (e.key === 'ArrowLeft')  changeView(-1);
    if (e.key === 'ArrowRight') changeView(1);
    if (e.key === '1') setColour('ecotronic');
    if (e.key === '2') setColour('cyber');
  }
});

// Click backdrop to close lightbox
document.getElementById('lightbox').addEventListener('click', e => {
  if (e.target === document.getElementById('lightbox') ||
      e.target === document.getElementById('lightbox-img')) {
    closeLightbox();
  }
});

// Touch swipe
let tx = null;
document.addEventListener('touchstart', e => { tx = e.touches[0].clientX; }, { passive: true });
document.addEventListener('touchend', e => {
  if (tx === null) return;
  const dx = e.changedTouches[0].clientX - tx;
  tx = null;
  if (Math.abs(dx) < 48) return;
  if (document.getElementById('lightbox').classList.contains('open')) {
    lbNavigate(dx < 0 ? 1 : -1);
  } else {
    changeView(dx < 0 ? 1 : -1);
  }
}, { passive: true });

init();
</script>
</body>
</html>
